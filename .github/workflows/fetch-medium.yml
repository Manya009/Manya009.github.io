name: Fetch Medium Posts
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Medium RSS
        run: |
          curl -s "https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@273manishp" \
            | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          posts = data.get('items', [])[:5]
          out = []
          for p in posts:
              desc = re.sub('<[^>]+>', '', p.get('description', ''))
              desc = re.sub(r'[^\x00-\x7F]+', '', desc)[:120].strip() + '...'
              title = re.sub(r'[^\x00-\x7F]+', '', p.get('title', ''))
              out.append({'title': title, 'url': p['link'], 'description': desc})
          print(json.dumps(out, ensure_ascii=True, indent=2))
          " > _data/medium_posts.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _data/medium_posts.json
          git diff --staged --quiet || git commit -m "Update Medium posts"
          git push