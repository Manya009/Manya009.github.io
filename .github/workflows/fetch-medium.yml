name: Fetch Medium Posts
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Medium RSS
        run: |
          curl -s "https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@273manishp" \
            | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          posts = data['items'][:3]
          out = []
          for p in posts:
              desc = p['description']
              import re
              desc = re.sub('<[^>]+>', '', desc)[:120].strip() + '...'
              out.append({'title': p['title'], 'url': p['link'], 'description': desc})
          print(json.dumps(out, indent=2))
          " > _data/medium_posts.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _data/medium_posts.json
          git diff --staged --quiet || git commit -m "Update Medium posts"
          git push